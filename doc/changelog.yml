  state:
    release: stable
    api: stable
  date: 2011-08-17
  license:
    identifier: GPL-2.0
    uri: http://www.horde.org/licenses/gpl
  notes: "[jan] Fix deleting resources (Bug #10427)\n[jan] Support snoozing alarms with Sundbird/Lightning (Request #7470).\n[jan] Import VALARM components from iCalendar 2.0 data (Request #6665).\n[jan] Fix exporting all-day events to Funambol clients (Thomas Ilsche <git@zulan.net>, Bug #10349).\n[jan] Fix creating events from dynamic view on Windows (Bug #9916).\n[mjr] Fix displaying of freebusy data in dynamic view (adominguez@cne.gob.ve, Bug #10347).\n"
3.0.7:
  api: 3.0.0
  state:
    release: stable
    api: stable
  date: 2011-08-05
  license:
    identifier: GPL-2.0
    uri: http://www.horde.org/licenses/gpl
  notes: "[mjr] Fix updating attendees (Bug #10411).\n[jan] Fix error if Nag is not installed (Bug #10406).\n"
3.0.6:
  api: 3.0.0
  state:
    release: stable
    api: stable
  date: 2011-08-02
  license:
    identifier: GPL-2.0
    uri: http://www.horde.org/licenses/gpl
  notes: "[jan] Display event time in dynamic agenda/search view.\n[jan] Don't load all shares with requested permissions from the backend if $conf['share']['hidden'] is enabled.\n[jan] Improve exporting all-day events to Funambol clients.\n[mjr] Fix removing an exception from a recurrence series (Bug # 10365).\n[jan] Close session while listing events to speed up parallel loading from different calendars.\n[jan] Share list of displayed task lists with Nag (requires Nag 3.0.3).\n[jan] Don't show import/export link in preferences if using the dynamic view.\n[mjr] Force ActiveSync device reset after sync_calendars pref is changed (Request #10342).\n[jan] Try to work with remote servers even if they don't support a recent WebDAV protocol version.\n[jan] Support updating attendees from vCalendar 1.0 iTip responses.\n[jan] Fix sending invitations to attendees from traditional view.\n[jan] Fix organizer attribute when exporting to vCalendar 1.0.\n[mjr] Fix issue that prevented synching when no sync_calendar pref was set (Bug #10329).\n"
3.0.5:
  api: 3.0.0
  state:
    release: stable
    api: stable
  date: 2011-07-05
  license:
    identifier: GPL-2.0
    uri: http://www.horde.org/licenses/gpl
  notes: "[jan] Update task due date in interface after dragging a task (Bug #10001).\n[jan] Correctly sort events in portal block or widget if only displaying a single calendar (Bug #10099).\n[mjr] Allow syncing of multiple owner-owned calendars (Request #8734).\n[jan] Don't show calendar drop down in event form without delete permissions (Bug #10201).\n[jan] Don't change event creator when saving events.\n[jan] Fetch events immediately after saving remote calendar.\n"
3.0.4:
  api: 3.0.0
  state:
    release: stable
    api: stable
  date: 2011-06-14
  license:
    identifier: GPL-2.0
    uri: http://www.horde.org/licenses/gpl
  notes: "[jan] Fix holidays being off with certain system timezones (Bug #9989).\n[jan] Only highlight days in the mini calendar that are currently displayed (Bug #10048).\n[jan] Fix advanced search with empty search criteria (Bug #10038).\n"
3.0.3:
  api: 3.0.0
  state:
    release: stable
    api: stable
  date: 2011-05-18
  license:
    identifier: GPL-2.0
    uri: http://www.horde.org/licenses/gpl
  notes: "[jan] Add header for timeobjects calendars.\n[jan] Fix date picker in advanced search form (Bug #10039).\n[mjr] Remove visible exceptions when deleting recurring events (Bug #10013).\n[mjr] Fix issue causing listTimeObject calendars to not appear (Bug #10012).\n"
3.0.2:
  api: 3.0.0
  state:
    release: stable
    api: stable
  date: 2011-05-03
  license:
    identifier: GPL-2.0
    uri: http://www.horde.org/licenses/gpl
  notes: "[jan] Don't show event edit links if user doesn't have edit permissions on any calendar.\n[jan] Fix parsing of recurrence end date in dynamic view (Bug #10025).\n[jan] Fix displaying of new tasks in new task lists.\n[jan] Fix displaying colors of task lists.\n[jan] Delete tasks from tasks view when deleting tasks lists.\n[jan] Don't export multi-day events as multiple events to iCalendar data (Bug #10007).\n[jan] Fix dragging tasks in the dynamic view.\n"
3.0.1:
  api: 3.0.0
  state:
    release: stable
    api: stable
  date: 2011-04-20
  license:
    identifier: GPL-2.0
    uri: http://www.horde.org/licenses/gpl
  notes: "[mjr] Fix calendar embedding.\n[jan] Don't store all task lists in the session.\n[jan] Fix new task lists not showing up until next login (Bug #9814).\n[mjr] Fix broken event alarm links in sidebar (Bug #9897).\n[mjr] Fix drag/drop editing of recurring events (Bug #9880).\n[jan] Fix undefined function on Windows (Bug #9916).\n[jan] Support adding and editing of CalDAV events in dynamic view (Bug #9865).\n[mjr] Allow migrations to complete despite of missing shares.\n[jan] Remove debug code in Ajax library (Bug #9818).\n"
3.0.0:
  api: 3.0.0
  state:
    release: stable
    api: stable
  date: 2011-04-06
  license:
    identifier: GPL-2.0
    uri: http://www.horde.org/licenses/gpl
  notes: "First stable release for Horde 4.\n[jan] Fix application-specific permission checks (Bug #9786).\n[jan] Fix fatal error when using the max_events permission (Bug #9784).\n[mjr] Datatree share to SQL upgrade script refactored for Horde 4.\n[mjr] Add migration for mysql specific geospatial fields (Bug #9758).\n[jan] Set default alarm in dynamic view (Bug #9752).\n[jan] Move all executable scripts to bin/ and prefix with kronolith-.\n"
3.0.0-RC2:
  api: 3.0.0
